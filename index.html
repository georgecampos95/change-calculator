
<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Change Calculator</title>
    </head>

  <body>
    <h1>Change Calculator</h1>

    <div class="input-section">
      <label for="amount-due">How much is due for the sale?</label>
      <input id="amount-due" type="number" step="0.01">

      <label for="amount-received">How much has the customer given you?</label>
      <input id="amount-received" type="number" step="0.01">

      <button id="calculate-change">Calculate Change</button>
    </div>

    <div class="output-section">
      <div class="output-label">Dollars</div>
      <p id="dollars-output">0</p>
    </div>

    <div class="coins-section">
      <div>
        <p>Quarters</p>
        <p id="quarters-output">0</p>
      </div>
      <div>
        <p>Dimes</p>
        <p id="dimes-output">0</p>
      </div>
      <div>
        <p>Nickels</p>
        <p id="nickels-output">0</p>
      </div>
      <div>
        <p>Pennies</p>
        <p id="pennies-output">0</p>
      </div>
    </div>

    <script src="main.js"></script>
  </body>
</html>
    <style>
  body {
    background-image: url('andre-taissin-5OUMf1Mr5pU-unsplash.jpg');
    background-size: cover;
    background-color: #e6f2e6;
    color: #f2fdf2;
    font-family: 'Trebuchet MS', sans-serif;
    padding: 20px;
  }

  h1 {
    color: #48c448;
    border-bottom: 2px solid #bfa100;
    margin-bottom: 20px;
  }

  #calculate-change {
    background-color: #0e7725;
    color: white;
    border: none;
    border-radius: 6px;
    padding: 10px 15px;
    font-size: 16px;
    cursor: pointer;
    margin-top: 10px;
  }

  input[type="number"] {
    padding: 8px;
    margin: 10px 0;
    border-radius: 4px;
    border: 1px solid #ccc;
    font-size: 16px;
  }

  .input-section {
    display: flex;
    flex-direction: column;
    max-width: 400px;
  }

  .output-section {
    text-align: center;
    margin-top: 60px;
  }

  .output-label {
    font-size: 40px;
    font-weight: bold;
    margin-bottom: 10px;
  }

  #dollars-output {
    font-size: 40px;
    margin: 0;
  }

  .coins-section {
    display: flex;
    justify-content: center;
    gap: 40px;
    margin-top: 30px;
    text-align: center;
  }

  .coins-section p {
    margin: 4px 0;
    font-size: 20px;
    font-weight: bold;
  }
</style>
